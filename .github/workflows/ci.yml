name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Typecheck · Lint · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Supply-chain policy guard
        run: bun run guard:supply-chain

      - name: ABI drift gate (generated from @0xintuition/contracts-v2)
        run: bun run abis:check

      - name: Typecheck
        run: bun run typecheck

      - name: Lint & format (Biome)
        run: bunx @biomejs/biome ci .

      - name: Test
        run: bun run test

      - name: Validate compose config
        run: |
          docker compose config -q
          docker compose -f docker-compose.datastores.yml config -q

  rust:
    name: Cargo fmt · Clippy · Test · Docs · Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          cache-workspaces: ". -> target"

      - name: Cargo format
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --workspace

      - name: Cargo docs
        run: cargo doc --workspace --no-deps

      - name: Install cargo-deny
        env:
          CARGO_DENY_VERSION: 0.20.2
        run: cargo install cargo-deny --version "${CARGO_DENY_VERSION}" --locked

      - name: Cargo deny
        run: cargo deny --exclude-unpublished check

      - name: Publish dry-run
        run: cargo publish -p intuition-curves --dry-run

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required for commit-range secret scans

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks on pull request commits
        if: github.event_name == 'pull_request'
        run: |
          gitleaks git \
            --config .gitleaks.toml \
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --redact \
            --verbose

      - name: Run gitleaks on pushed commits
        if: github.event_name == 'push'
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            gitleaks git \
              --config .gitleaks.toml \
              --log-opts="${{ github.sha }}~1..${{ github.sha }}" \
              --redact \
              --verbose
          else
            gitleaks git \
              --config .gitleaks.toml \
              --log-opts="${{ github.event.before }}..${{ github.sha }}" \
              --redact \
              --verbose
          fi
