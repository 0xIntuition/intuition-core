name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Typecheck · Lint · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Supply-chain policy guard
        run: bun run guard:supply-chain

      - name: Typecheck
        run: bun run typecheck

      - name: Lint & format (Biome)
        run: bunx @biomejs/biome ci .

      - name: Test
        run: bun run test

      - name: Validate compose config
        run: |
          docker compose config -q
          docker compose -f docker-compose.datastores.yml config -q

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required for commit-range secret scans

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks on pull request commits
        if: github.event_name == 'pull_request'
        run: |
          gitleaks git \
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --redact \
            --verbose

      - name: Run gitleaks on pushed commits
        if: github.event_name == 'push'
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            gitleaks git \
              --log-opts="${{ github.sha }}~1..${{ github.sha }}" \
              --redact \
              --verbose
          else
            gitleaks git \
              --log-opts="${{ github.event.before }}..${{ github.sha }}" \
              --redact \
              --verbose
          fi
