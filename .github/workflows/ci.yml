name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Typecheck · Lint · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Supply-chain policy guard
        run: bun run guard:supply-chain

      - name: ABI drift gate (generated from @0xintuition/contracts-v2)
        run: bun run abis:check

      - name: Typecheck
        run: bun run typecheck

      - name: Lint & format (Biome)
        run: bunx @biomejs/biome ci .

      - name: Test
        run: bun run test

      - name: Validate compose config
        run: |
          docker compose config -q
          docker compose -f docker-compose.datastores.yml config -q

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — scan every commit, not just HEAD

      - name: Run gitleaks (history + tree)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
